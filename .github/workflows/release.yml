name: Release

# Triggers only when a version tag is pushed (e.g. v1.2.0)
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest  # Required: net48 + WinForms needs Windows

    # Allow the workflow to create releases via GITHUB_TOKEN
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'   # SDK only needed for MSBuild; net48 TFM is pre-installed on windows-latest

      - name: Download CommsRadioAPI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "lib" -Force | Out-Null
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/fauxnik/dv-comms-radio-api/releases/latest" `
            -Headers @{ "User-Agent" = "GRDNConnect-CI" }
          # Try a bare .dll asset first, fall back to zip extraction
          $dll = $release.assets | Where-Object { $_.name -like "*CommsRadioAPI*.dll" } | Select-Object -First 1
          if ($dll) {
            Invoke-WebRequest -Uri $dll.browser_download_url -OutFile "lib\CommsRadioAPI.dll"
            Write-Host "Downloaded $($dll.name)"
          } else {
            $zip = $release.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1
            if (-not $zip) { Write-Error "No CommsRadioAPI asset found in release"; exit 1 }
            Invoke-WebRequest -Uri $zip.browser_download_url -OutFile "CommsRadioAPI.zip"
            Expand-Archive -Path "CommsRadioAPI.zip" -DestinationPath "CommsRadioAPI_extracted" -Force
            $found = Get-ChildItem -Path "CommsRadioAPI_extracted" -Filter "CommsRadioAPI.dll" -Recurse |
                     Select-Object -First 1
            if (-not $found) { Write-Error "CommsRadioAPI.dll not found inside zip"; exit 1 }
            Copy-Item $found.FullName "lib\CommsRadioAPI.dll"
            Write-Host "Extracted CommsRadioAPI.dll from $($zip.name)"
          }
          Write-Host "lib\CommsRadioAPI.dll is ready — COMMS_RADIO_API will be defined"

      - name: Restore NuGet packages
        run: dotnet restore GRDNConnect.csproj

      - name: Build (Release)
        run: dotnet build GRDNConnect.csproj -c Release --no-restore

      - name: Package
        run: |
          New-Item -ItemType Directory -Path "release\GRDNConnect" -Force | Out-Null
          $dll = Get-ChildItem -Path "bin\Release" -Filter "GRDNConnect.dll" -Recurse | Select-Object -First 1
          Copy-Item $dll.FullName "release\GRDNConnect\"
          Copy-Item "Info.json" "release\GRDNConnect\"
          Compress-Archive -Path "release\GRDNConnect" -DestinationPath "GRDNConnect-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GRDNConnect ${{ github.ref_name }}"
          files: "GRDNConnect-${{ github.ref_name }}.zip"
          generate_release_notes: true
          fail_on_unmatched_files: true
